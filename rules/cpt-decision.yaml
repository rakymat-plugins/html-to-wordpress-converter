cpt_decision:
  principle: "No CPT without a documented content-management reason."
  allowed_only_if:
    - reused_across_pages
    - needs_own_url
    - needs_archive_pages
    - needs_filtering_or_search
    - needs_categories_or_tags
    - managed_regularly_by_non_technical_editors
    - too_large_for_page_local_repeater
    - needs_independent_admin_workflow
  prefer_acf_repeater_when:
    - section_local_small_list
    - one_off_content
    - decorative_items
    - small_faq_lists
    - three_or_fewer_homepage_testimonials
    - simple_service_cards_without_single_pages
    - small_static_team_or_leadership_section
    - logos
    - icon_lists
    - stats
  usually_cpt_when:
    - products
    - projects
    - news
    - events
    - services_with_single_pages
    - full_team_directory
    - searchable_faq_knowledge_base
    - testimonials_reused_across_pages
  required_documentation:
    artifact: ".html-to-sage/CPT-TAXONOMY-MAP.md"
    fields:
      - reason
      - fields
      - taxonomies
      - archive_route
      - single_route
      - admin_labels
      - query_performance_notes
  forbidden:
    - creating_cpt_for_visual_cards_only
    - creating_cpt_for_one_off_content
    - mixing_cpt_registration_with_block_logic
    - using_posts_per_page_minus_one_without_justification

